<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option C — Particle Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f0e8;
    color: #1e1914;
    font-family: 'Source Sans 3', sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .hero {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .corner-tr, .corner-bl {
    position: absolute;
    width: 2rem;
    height: 2rem;
    z-index: 3;
  }
  .corner-tr {
    top: 2rem; right: 2rem;
    border-top: 1px solid #8b7355;
    border-right: 1px solid #8b7355;
  }
  .corner-bl {
    bottom: 2rem; left: 2rem;
    border-bottom: 1px solid #8b7355;
    border-left: 1px solid #8b7355;
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
  }

  .label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b7355;
    margin-bottom: 2rem;
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw + 1rem, 7rem);
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }

  .line {
    width: 6rem;
    height: 1px;
    background: #8b7355;
    margin: 0 auto 1.5rem;
  }

  .subtitle {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #5c4d3c;
  }

  .badge {
    position: fixed;
    top: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #8b7355;
    background: #ebe3d7;
    padding: 0.5rem 1.25rem;
    border-radius: 2rem;
    z-index: 10;
  }

  .hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #d4c5b0;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="hero">
  <canvas id="particleCanvas"></canvas>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>

  <div class="badge">Option C — Particle Field</div>

  <div class="content">
    <p class="label">Portfolio — 2026</p>
    <h1 class="name">Euan Hill</h1>
    <div class="line"></div>
    <p class="subtitle">AI Consultant & Technologist</p>
  </div>

  <p class="hint">Move your cursor to disturb the particles</p>
</div>

<script>
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');

  let width, height;
  let mouseX = -1000, mouseY = -1000;
  const mouseRadius = 180;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  document.addEventListener('mouseleave', () => {
    mouseX = -1000;
    mouseY = -1000;
  });

  // Copper-toned colour palette
  const colors = [
    'rgba(139, 115, 85, 0.4)',   // copper
    'rgba(212, 165, 116, 0.3)',  // copper-light
    'rgba(212, 197, 176, 0.25)', // copper-muted
    'rgba(139, 115, 85, 0.15)',  // copper faint
    'rgba(92, 77, 60, 0.2)',     // brown-light
  ];

  class Particle {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.originX = this.x;
      this.originY = this.y;
      this.size = Math.random() * 2.5 + 0.5;
      this.color = colors[Math.floor(Math.random() * colors.length)];
      this.vx = (Math.random() - 0.5) * 0.8;
      this.vy = (Math.random() - 0.5) * 0.8;
      this.life = Math.random() * 0.5 + 0.5;
      // Slight size pulsing
      this.pulseSpeed = Math.random() * 0.02 + 0.005;
      this.pulseOffset = Math.random() * Math.PI * 2;
      this.baseSize = this.size;
    }

    update() {
      // Drift
      this.x += this.vx;
      this.y += this.vy;

      // Mouse repulsion
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < mouseRadius) {
        const force = (1 - dist / mouseRadius) * 5;
        this.vx += (dx / dist) * force * 0.3;
        this.vy += (dy / dist) * force * 0.3;
      }

      // Friction
      this.vx *= 0.98;
      this.vy *= 0.98;

      // Gentle pull back to origin
      this.x += (this.originX - this.x) * 0.008;
      this.y += (this.originY - this.y) * 0.008;

      // Pulse size
      this.size = this.baseSize + Math.sin(Date.now() * this.pulseSpeed + this.pulseOffset) * 0.4;

      // Wrap around
      if (this.x < -10) this.x = width + 10;
      if (this.x > width + 10) this.x = -10;
      if (this.y < -10) this.y = height + 10;
      if (this.y > height + 10) this.y = -10;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }

  // Create particles — dense field
  const particleCount = Math.min(400, Math.floor((width * height) / 3500));
  const particles = Array.from({ length: particleCount }, () => new Particle());

  // Spatial grid for efficient neighbour lookup
  function drawConnections() {
    const maxDist = 120;
    const cellSize = maxDist;
    const grid = {};

    // Bin particles into cells
    for (let i = 0; i < particles.length; i++) {
      const cx = Math.floor(particles[i].x / cellSize);
      const cy = Math.floor(particles[i].y / cellSize);
      const key = `${cx},${cy}`;
      if (!grid[key]) grid[key] = [];
      grid[key].push(i);
    }

    // Only check neighbouring cells
    ctx.lineWidth = 0.5;
    for (let i = 0; i < particles.length; i++) {
      const cx = Math.floor(particles[i].x / cellSize);
      const cy = Math.floor(particles[i].y / cellSize);

      for (let ox = -1; ox <= 1; ox++) {
        for (let oy = -1; oy <= 1; oy++) {
          const neighbours = grid[`${cx + ox},${cy + oy}`];
          if (!neighbours) continue;

          for (const j of neighbours) {
            if (j <= i) continue;
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < maxDist) {
              const opacity = (1 - dist / maxDist) * 0.15;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(139, 115, 85, ${opacity})`;
              ctx.stroke();
            }
          }
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    drawConnections();

    requestAnimationFrame(animate);
  }

  animate();
</script>
</body>
</html>
